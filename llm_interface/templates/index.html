<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">

    <title>AI Academic Success Companion</title>

    <style>

        body{

            font-family:Arial;

            background:#f5f5f5;

            margin:40px;

        }

        h2{

            text-align:center;

        }

        #chat{

            background:white;

            height:500px;

            overflow-y:auto;

            padding:15px;

            border-radius:8px;

            border:1px solid #ddd;

        }

        .user{

            color:blue;

            margin-top:15px;

        }

        .bot{

            color:green;

            margin-bottom:20px;

            white-space:pre-wrap;

        }

        input{

            width:80%;

            padding:12px;

            margin-top:20px;

        }

        button{

            padding:12px;

        }

    </style>

</head>

<body>

<h2>🎓 AI Academic Success Companion</h2>

<div id="chat"></div>

<input
id="message"
placeholder="Ask me anything...">

<button onclick="sendMessage()">
Send
</button>

<script>

async function sendMessage(){

    const input=document.getElementById("message");

    const chat=document.getElementById("chat");

    const message=input.value.trim();

    if(message==="") return;

    chat.innerHTML +=
    `<div class="user"><b>You:</b> ${message}</div>`;

    input.value="";

    const response=await fetch("/chat",{

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            message:message

        })

    });

    const data=await response.json();

    chat.innerHTML +=
    `<div class="bot"><b>Assistant:</b><br>${data.response}</div>`;

    chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
